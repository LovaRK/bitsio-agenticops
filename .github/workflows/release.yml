name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.2.0)'
        required: true
        type: string

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version format
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [[ ! $VERSION =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ Invalid version format: $VERSION"
            echo "   Expected: X.Y.Z (e.g., 0.2.0)"
            exit 1
          fi
          echo "✅ Version format valid: $VERSION"

      - name: Check for existing tag
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "❌ Tag v$VERSION already exists"
            exit 1
          fi
          echo "✅ Tag v$VERSION doesn't exist"

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install uv
        run: pip install uv

      - name: Run unit tests
        run: make test

      - name: Run linting
        run: make lint
        continue-on-error: true

  release:
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Generate changelog
        id: changelog
        run: |
          VERSION="${{ github.event.inputs.version }}"

          # Get commits since last tag
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "HEAD~20")
          COMMITS=$(git log $LAST_TAG...HEAD --oneline --decorate)

          # Parse conventional commits
          FEATURES=$(echo "$COMMITS" | grep "feat:" || echo "")
          FIXES=$(echo "$COMMITS" | grep "fix:" || echo "")
          BREAKING=$(echo "$COMMITS" | grep "BREAKING CHANGE:" || echo "")

          # Write changelog
          cat > CHANGELOG_ENTRY.md << EOF
          # Version $VERSION ($(date +%Y-%m-%d))

          ## Features
          $(echo "$FEATURES" | sed 's/.*feat:\s*/- /' || echo "- No new features in this release")

          ## Bug Fixes
          $(echo "$FIXES" | sed 's/.*fix:\s*/- /' || echo "- No bug fixes in this release")

          ## Breaking Changes
          $(if [ -n "$BREAKING" ]; then echo "$BREAKING" | sed 's/BREAKING CHANGE:\s*/⚠️ /'; else echo "None"; fi)

          ## Contributors
          $(git log $LAST_TAG...HEAD --format="%an" | sort -u | sed 's/^/- /')
          EOF

          cat CHANGELOG_ENTRY.md

      - name: Create Git tag
        run: |
          VERSION="${{ github.event.inputs.version }}"
          git tag -a "v$VERSION" -m "Release v$VERSION"
          echo "✅ Created tag v$VERSION"

      - name: Push tag
        run: |
          git push origin "v${{ github.event.inputs.version }}"
          echo "✅ Pushed tag to repository"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.event.inputs.version }}
          body_path: CHANGELOG_ENTRY.md
          draft: false
          prerelease: false
          files: |
            CHANGELOG_ENTRY.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker-build:
    needs: release
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      packages: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ github.event.inputs.version }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker images
        run: |
          VERSION="${{ github.event.inputs.version }}"
          docker compose build --no-cache
          docker tag bitsio-agenticops-api:latest bitsio-agenticops-api:$VERSION
          docker tag bitsio-agenticops-web:latest bitsio-agenticops-web:$VERSION
          echo "✅ Docker images built with tag v$VERSION"

      - name: Inspect images
        run: |
          docker images | grep bitsio-agenticops || echo "Images tagged"

  announce:
    needs: [ validate, release, docker-build ]
    runs-on: ubuntu-latest
    if: success()

    steps:
      - uses: actions/checkout@v4

      - name: Release summary
        run: |
          VERSION="${{ github.event.inputs.version }}"
          echo "🎉 Release $VERSION Complete!"
          echo ""
          echo "📦 Artifacts:"
          echo "  - GitHub Release: https://github.com/${{ github.repository }}/releases/tag/v$VERSION"
          echo "  - Docker Images: bitsio-agenticops-api:$VERSION, bitsio-agenticops-web:$VERSION"
          echo ""
          echo "🚀 Next Steps:"
          echo "  1. Test images in staging: docker pull bitsio-agenticops-api:$VERSION"
          echo "  2. Deploy to staging for final QA"
          echo "  3. Monitor for issues"
          echo "  4. Deploy to production (manual approval recommended)"

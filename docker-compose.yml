services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: bitsio
      POSTGRES_PASSWORD: bitsio
      POSTGRES_DB: bitsio_agenticops
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"

  mock-mcp:
    build:
      context: .
      dockerfile: infra/docker/compose/mock-mcp.Dockerfile
    ports:
      - "8081:8081"

  api:
    build:
      context: .
      dockerfile: infra/docker/compose/api.Dockerfile
    env_file: .env
    ports:
      - "8001:8001"
    depends_on:
      - postgres
      - redis
      - mock-mcp

  worker:
    build:
      context: .
      dockerfile: infra/docker/compose/worker.Dockerfile
    env_file: .env
    depends_on:
      - postgres
      - redis

  web:
    build:
      context: .
      dockerfile: infra/docker/compose/web.Dockerfile
    env_file: .env
    environment:
      INTERNAL_API_BASE_URL: http://api:8001
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8001
    ports:
      - "3000:3000"
    depends_on:
      - api

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.108.0
    command: ["--config=/etc/otelcol/otel-collector-config.yaml"]
    volumes:
      - ./packages/observability/otel/otel-collector-config.yaml:/etc/otelcol/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"

volumes:
  postgres_data:

version: '3.9'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: bitsio-postgres
    environment:
      POSTGRES_USER: bitsio
      POSTGRES_PASSWORD: bitsio_dev_password
      POSTGRES_DB: telemetry_agent
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bitsio"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bitsio-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: bitsio-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_MODELS: /root/.ollama/models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: bitsio-api
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql+asyncpg://bitsio:bitsio_dev_password@postgres:5432/telemetry_agent
      REDIS_URL: redis://redis:6379
      OLLAMA_BASE_URL: http://ollama:11434
      DEFAULT_MODEL_PROVIDER: ollama
      DEFAULT_MODEL_NAME: gemma:2b
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    volumes:
      - ./apps/api:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: bitsio-web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8001
      NEXT_PUBLIC_USE_MOCK: "false"
    depends_on:
      - api
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: bitsio-otel
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./docker/otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8888:8888"
      - "8889:8889"
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  ollama_data:

networks:
  default:
    name: bitsio-network